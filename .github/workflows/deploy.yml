name: Deploy to Salesforce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Write JWT private key to file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > private.pem

      - name: Authenticate to Salesforce via JWT
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file private.pem \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_LOGIN_URL }}" \
            --alias deploy-org \
            --set-default

      - name: Deploy source to org
        run: |
          sf project deploy start \
            --manifest manifest/package1.xml \
            --target-org deploy-org

      - name: Clean up key file
        if: always()
        run: rm -f private.pem
